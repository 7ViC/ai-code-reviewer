version: '3.9'

services:
  api:
    build: .
    ports:
      - "8080:8080"
    env_file:
      - .env
    volumes:
      # Mount GCP Application Default Credentials for local Vertex AI access
      - "${HOME}/.config/gcloud:/root/.config/gcloud:ro"
    environment:
      - PORT=8080
    restart: unless-stopped
